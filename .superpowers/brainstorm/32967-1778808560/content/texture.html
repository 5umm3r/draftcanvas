<h2>ライト時 blob の質感</h2>
<p class="subtitle">同じ色相でも「光」か「染料」かで blend mode と印象が変わる</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">P1: 発光（光が滲む）</div>
    <div class="mockup-body" style="background:#fafafc;padding:20px;display:flex;align-items:center;justify-content:center;min-height:240px;">
      <div style="width:200px;height:200px;border-radius:12px;background:radial-gradient(circle at 35% 40%, #fff 0%, rgba(255,170,200,0.85) 18%, transparent 50%), radial-gradient(circle at 70% 60%, #fff 0%, rgba(190,150,255,0.8) 18%, transparent 50%), radial-gradient(circle at 50% 75%, #fff 0%, rgba(140,210,255,0.85) 18%, transparent 50%), #ffffff;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05);"></div>
    </div>
  </div>
  <div class="mockup">
    <div class="mockup-header">P2: 染料（色が浸透）</div>
    <div class="mockup-body" style="background:#fafafc;padding:20px;display:flex;align-items:center;justify-content:center;min-height:240px;">
      <div style="width:200px;height:200px;border-radius:12px;background:radial-gradient(circle at 35% 40%, rgba(220,60,120,0.55) 0%, transparent 55%), radial-gradient(circle at 70% 60%, rgba(140,70,220,0.5) 0%, transparent 55%), radial-gradient(circle at 50% 75%, rgba(40,140,220,0.55) 0%, transparent 55%), #ffffff;mix-blend-mode:multiply;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05);"></div>
    </div>
  </div>
</div>

<div class="options" style="margin-top:24px;">
  <div class="option" data-choice="p1" onclick="toggleSelect(this)">
    <div class="letter">P1</div>
    <div class="content">
      <h3>発光（screen/plusLighter 系）</h3>
      <p>中心ほど白に飛ぶ。光源・ネオン・スポットライト的。<b>ダークモードと連続性最大</b>（同じ加算系）。ライト時は淡く儚い印象。</p>
    </div>
  </div>
  <div class="option" data-choice="p2" onclick="toggleSelect(this)">
    <div class="letter">P2</div>
    <div class="content">
      <h3>染料（multiply 系）</h3>
      <p>白BG にインク・水彩が滲むイメージ。<b>彩度感が残る</b>・ライトUIに自然調和。ただしダーク版とは見え方が大きく異なる（別物感あり）。</p>
    </div>
  </div>
</div>
