a{color:inherit;text-decoration:none}

nav{display:flex;align-items:center;justify-content:space-between;padding:16px 48px;border-bottom:1px solid #18181b;position:sticky;top:0;background:rgba(8,8,16,.9);backdrop-filter:blur(12px);z-index:100}

h1{font-size:46px;font-weight:800;line-height:1.15;letter-spacing:-.5px;color:#fff;margin-bottom:20px}
h1 .grad{background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.hero-cta{display:flex;flex-direction:column;gap:10px}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;padding:14px 32px;border-radius:10px;font-size:15px;font-weight:700;width:fit-content}
.btn-primary:hover{opacity:.9}
.cta-note{color:#52525b;font-size:13px;padding-left:2px}
.hero-img{border-radius:16px;border:1px solid #312e81;overflow:hidden;box-shadow:0 25px 60px rgba(79,70,229,.25);aspect-ratio:4/3;background:linear-gradient(135deg,#1e1b4b,#0f172a);display:flex;align-items:center;justify-content:center;color:#4f46e5;font-size:14px}
.hero-img img{width:100%;height:100%;object-fit:cover}

/* Responsive */
@media(max-width:768px){
  nav{padding:12px 20px}
  .hero{grid-template-columns:1fr;gap:40px;padding:60px 20px}
